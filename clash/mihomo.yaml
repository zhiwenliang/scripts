# ========================
# Proxy Providers（订阅源）
# ========================
proxy-providers:
  my-sub:
    type: http
    url: "https://YOUR_SUBSCRIPTION_URL_HERE"  # ← 替换为你的订阅链接
    path: ./proxies/my-sub.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true

# ========================
# 地区分组（按节点名正则匹配）
# ========================
proxy-groups:
  # 手动选择组
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"
      - "🇰🇷 韩国"
      - "🇬🇧 欧洲"
      - "🇹🇭 东南亚"
      - "🌐 其他"
      - DIRECT

  # 地区自动选优组
  - name: "🇭🇰 香港"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: '(?i)港|HK|Hong\s*Kong|🇭🇰'

  - name: "🇹🇼 台湾"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)台|TW|Taiwan|🇹🇼"

  - name: "🇯🇵 日本"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)日|JP|Japan|🇯🇵"

  - name: "🇸🇬 新加坡"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)新|狮|SG|Singapore|🇸🇬"

  - name: "🇺🇸 美国"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: '(?i)美|US|USA|United\s*States|America|🇺🇸'

  - name: "🇰🇷 韩国"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)韩|KR|Korea|🇰🇷"

  - name: "🇬🇧 欧洲"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)英|法|德|荷|瑞|奥|爱尔兰|意大利|UK|GB|DE|FR|NL|EU|Europe|Britain|Germany|France|Netherlands|🇬🇧|🇩🇪|🇫🇷|🇳🇱|🇨🇭|🇦🇹|🇮🇪|🇮🇹"

  - name: "🇹🇭 东南亚"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my-sub
    filter: "(?i)泰|越|菲|印尼|马来|柬|缅|TH|VN|PH|ID|MY|Thailand|Vietnam|Philippines|Indonesia|Malaysia|🇹🇭|🇻🇳|🇵🇭|🇮🇩|🇲🇾"

  - name: "🌐 其他"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100
    use:
      - my-sub
    filter: '(?i)^(?!.*(港|台|日|新|狮|美|韩|英|法|德|荷|瑞|奥|爱尔兰|意大利|泰|越|菲|印尼|马来|柬|缅|HK|TW|JP|SG|US|USA|KR|UK|GB|DE|FR|NL|EU|TH|VN|PH|ID|MY|Hong\s*Kong|Taiwan|Japan|Singapore|United\s*States|America|Korea|Britain|Germany|France|Netherlands|Europe|Thailand|Vietnam|Philippines|Indonesia|Malaysia)).*$'

  # ========================
  # 功能分流组
  # ========================
  - name: "📺 YouTube"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"
      - "🇰🇷 韩国"

  - name: "🎬 Netflix"
    type: select
    proxies:
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - "🇰🇷 韩国"
      - "🚀 节点选择"

  - name: "🎵 Spotify"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇹🇼 台湾"
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - DIRECT

  - name: "📱 Telegram"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"

  - name: "🤖 AI"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇰🇷 韩国"
      - "🇹🇼 台湾"
      - "🚀 节点选择"

  - name: "🍎 Apple"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"

  - name: "Ⓜ️ Microsoft"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"

  - name: "🎮 游戏"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇰🇷 韩国"
      - "🇺🇸 美国"
      - "🇹🇼 台湾"

  - name: "🌍 Google"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
